echo "=== setkey selftest start ==="
echo "1) read hide/asterisk"
echo -n "type hidden text then Enter: "
read user_input hide
echo
echo "captured value is stored in \$user_input"

echo "2) increment/decrement"
set counter=10
increment counter
decrement counter
echo "counter should be 10: ${counter}"

echo "3) read_file"
echo "prepare a test file with at least two lines, then run:"
echo "  read_file (hdX,Y)/path/to/test.txt line1 line2"

echo "4) setkey runtime mapping"
echo "mapping enter -> esc"
setkey enter esc
setkey --enable
echo "press Enter now, getkey should print ESC scan value"
getkey keycode
echo "keycode=${keycode}"
setkey --disable
setkey --reset

echo "=== setkey selftest end ==="
